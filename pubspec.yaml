name: qiyas_ready
description: Exam Prep MVP foundation
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  http: ^1.2.2
  flutter_dotenv: ^5.1.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  flutter_svg: ^2.2.4
  google_sign_in: ^6.2.2
  flutter_facebook_auth: ^7.1.1
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.3
  screen_protector: ^1.5.1
  flutter_markdown: ^0.7.6
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  fl_chart: ^0.68.0
  connectivity_plus: ^6.0.3
  purchases_flutter: any
  firebase_messaging: ^16.2.0
  google_fonts: ^6.2.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
